# 角色资料：罗宾 (Robin)
# 项目：人类刹车计划 - 第一幕「深水埗暗线」

name: 罗宾
code: robin
type: 原创角色

## 外观特征（从三视图描述）
- 银色挑染短发
- 黑色皮衣
- 锐利眼神
- 冷冽气质

## 关键道具
- U 盘（老旧）
- 黑色改装摩托车

## 场景
- 香港深水埗深夜茶餐厅
- 门外街景（霓虹灯、雨雾、湿滑地面）

## 视觉基调
- 前半段：暖黄市井烟火气
- 后半段：冷蓝 + 暗黑（暴力冲击反差）

